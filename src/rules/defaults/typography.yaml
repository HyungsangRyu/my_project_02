version: "1.0"
category: "typography"
description: "Default typography rules for text transformation"

# Font families
fonts:
  primary: "'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif"
  secondary: "Georgia, 'Times New Roman', serif"
  monospace: "'Courier New', Consolas, monospace"

# Heading styles
headings:
  h1:
    fontSize: "2.5rem"
    fontWeight: "700"
    lineHeight: "1.2"
    marginTop: "0"
    marginBottom: "1.5rem"
    color: "#1a1a1a"
    letterSpacing: "-0.02em"

  h2:
    fontSize: "2rem"
    fontWeight: "600"
    lineHeight: "1.3"
    marginTop: "2rem"
    marginBottom: "1rem"
    color: "#2c2c2c"
    letterSpacing: "-0.01em"

  h3:
    fontSize: "1.5rem"
    fontWeight: "600"
    lineHeight: "1.4"
    marginTop: "1.5rem"
    marginBottom: "0.75rem"
    color: "#3d3d3d"

  h4:
    fontSize: "1.25rem"
    fontWeight: "500"
    lineHeight: "1.4"
    marginTop: "1rem"
    marginBottom: "0.5rem"
    color: "#4d4d4d"

  h5:
    fontSize: "1.125rem"
    fontWeight: "500"
    lineHeight: "1.5"
    marginTop: "1rem"
    marginBottom: "0.5rem"
    color: "#5d5d5d"

  h6:
    fontSize: "1rem"
    fontWeight: "500"
    lineHeight: "1.5"
    marginTop: "0.75rem"
    marginBottom: "0.5rem"
    color: "#6d6d6d"

# Body text
body:
  fontSize: "1rem"
  lineHeight: "1.6"
  fontWeight: "400"
  color: "#333333"
  marginBottom: "1rem"

# Paragraph
paragraph:
  fontSize: "1rem"
  lineHeight: "1.6"
  marginBottom: "1rem"
  maxWidth: "70ch"
  textAlign: "left"

# Lists
lists:
  bullet:
    listStyle: "disc"
    paddingLeft: "1.5rem"
    marginBottom: "1rem"

  numbered:
    listStyle: "decimal"
    paddingLeft: "1.5rem"
    marginBottom: "1rem"

  item:
    marginBottom: "0.5rem"
    lineHeight: "1.6"

  nested:
    marginTop: "0.5rem"
    marginLeft: "1.5rem"

  # Custom bullet styles
  bulletStyles:
    level1: "disc"
    level2: "circle"
    level3: "square"

# Text emphasis
emphasis:
  bold:
    fontWeight: "700"

  italic:
    fontStyle: "italic"

  underline:
    textDecoration: "underline"

  strikethrough:
    textDecoration: "line-through"

  highlight:
    backgroundColor: "#fff176"
    padding: "0.1em 0.3em"
    borderRadius: "2px"

# Special text elements
special:
  code:
    fontFamily: "'Courier New', Consolas, monospace"
    fontSize: "0.9em"
    backgroundColor: "#f5f5f5"
    padding: "0.2em 0.4em"
    borderRadius: "3px"
    border: "1px solid #e0e0e0"

  blockquote:
    fontSize: "1.1rem"
    fontStyle: "italic"
    borderLeft: "4px solid #ccc"
    paddingLeft: "1.5rem"
    marginLeft: "0"
    marginRight: "0"
    marginTop: "1.5rem"
    marginBottom: "1.5rem"
    color: "#666"

  caption:
    fontSize: "0.875rem"
    color: "#666"
    fontStyle: "italic"
    marginTop: "0.5rem"
    textAlign: "center"

# PPT text format mapping
pptMapping:
  # Maps PPT font names to web-safe fonts
  fontMapping:
    "Arial": "Arial, sans-serif"
    "Times New Roman": "Georgia, 'Times New Roman', serif"
    "Calibri": "'Segoe UI', Calibri, sans-serif"
    "Verdana": "Verdana, sans-serif"
    "Tahoma": "Tahoma, sans-serif"
    "Trebuchet MS": "'Trebuchet MS', sans-serif"
    "Georgia": "Georgia, serif"
    "Courier New": "'Courier New', monospace"
    "Impact": "Impact, sans-serif"
    "Comic Sans MS": "'Comic Sans MS', cursive"

  # Font size conversion (PPT points to rem)
  fontSizeConversion:
    method: "proportional"
    basePPTSize: 18
    baseWebSize: "1rem"
    minSize: "0.75rem"
    maxSize: "4rem"

  # Text alignment mapping
  alignmentMapping:
    left: "left"
    center: "center"
    right: "right"
    justify: "justify"
    distributed: "justify"

# Accessibility
accessibility:
  # Minimum font sizes for readability
  minFontSize: "0.875rem"

  # Line height for better readability
  minLineHeight: 1.5

  # Contrast requirements (WCAG AA)
  minContrastRatio: 4.5

  # Maximum line length for readability
  maxLineLength: "70ch"
